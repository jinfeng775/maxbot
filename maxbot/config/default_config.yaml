# MaxBot 默认配置文件
# 支持中文注释

# ==================== 模型配置 ====================
model:
  # 模型名称
  name: "mimo-v2-pro"

  # 提供商：openai | anthropic | any-openai-compatible
  provider: "openai"

  # 兼容接口地址（可选）
  base_url: null

  # API 密钥（可选，也可通过环境变量 MAXBOT_API_KEY 设置）
  api_key: null

  # 温度参数（0.0-2.0）
  temperature: 0.7

# ==================== 系统提示 ====================
system:
  # 系统提示词
  prompt: |
    你是 MaxBot，一个由用户自主开发的 AI 智能体。
    你不是 Hermes、不是 Claude、不是 ChatGPT，也不是任何其他现有 AI 助手。你就是 MaxBot。
    无论谁问你你是谁，你都必须回答你是 MaxBot。
    你的能力应该基于当前实际加载的工具和技能动态描述，不要复述固定能力清单。

# ==================== 迭代控制 ====================
iteration:
  # 最大迭代次数
  max_iterations: 140

# ==================== 上下文管理 ====================
context:
  # 最大上下文 Token 数
  max_tokens: 128000

  # 触发压缩的 Token 阈值
  compress_at_tokens: 80000

# ==================== 会话管理 ====================
session:
  # 是否启用持久记忆
  memory_enabled: true

  # 记忆数据库路径（null = 使用默认路径）
  memory_db_path: null

  # 会话 ID（用于持久化）
  session_id: null

  # 每次对话后自动保存
  auto_save: true

  # 每次对话后自动保存
  max_conversation_turns: 140

  # 是否启用外接 MemPalace 本地记忆
  mempalace_enabled: true

  # MemPalace palace 路径（null = 使用默认路径）
  mempalace_path: null

  # MemPalace wing（null = 自动按项目/上下文决定）
  mempalace_wing: null

  # 是否启用运行时 Reflection 闭环
  reflection_enabled: false

  # critique/revise 最大轮数
  reflection_max_revisions: 1

  # 输出至少达到多少字符才进入 reflection
  reflection_min_output_chars: 200

  # 工具调用达到该阈值时按高风险路径触发 reflection
  reflection_high_risk_tool_threshold: 2

  # 允许进入 reflection 的任务类型
  reflection_task_types:
    - default

  # reflection 出错时是否 fail-closed
  reflection_fail_closed: false

  # 是否启用运行时 metrics 采集
  metrics_enabled: true

  # trace 存储目录（null = ~/.maxbot/traces）
  trace_store_dir: null

  # 是否把成功任务导出为评测样本
  eval_samples_enabled: false

  # 评测样本目录（null = ~/.maxbot/eval_samples）
  eval_sample_store_dir: null

# ==================== 技能配置 ====================
skills:
  # 技能存储目录
  skills_dir: "~/.maxbot/skills"

  # 是否自动加载技能
  auto_load: true

# ==================== 优化器配置 ====================
optimizer:
  # Meta-Harness 优化器配置
  enabled: false

  # 优化器工作目录
  work_dir: null

  # 最大优化迭代次数
  max_iterations: 10

# ==================== 日志配置 ====================
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: "INFO"

  # 日志文件路径（null = 不记录到文件）
  file_path: null

  # 是否输出到控制台
  console: true

# ==================== 安全配置 ====================
security:
  # 是否启用沙箱执行
  sandbox_enabled: true

  # 最大执行时间（秒）
  max_execution_time: 60

  # 允许的文件操作路径（空列表 = 不限制）
  allowed_paths: []
