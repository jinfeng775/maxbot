# MaxBot 默认配置文件
# 支持中文注释

# ==================== 模型配置 ====================
model:
  # 模型名称
  name: "mimo-v2-pro"

  # 提供商：openai | anthropic | any-openai-compatible
  provider: "openai"

  # 兼容接口地址（可选）
  base_url: null

  # API 密钥（可选，也可通过环境变量 MAXBOT_API_KEY 设置）
  api_key: null

  # 温度参数（0.0-2.0）
  temperature: 0.7

# ==================== 系统提示 ====================
system:
  # 系统提示词
  prompt: |
    你是 MaxBot，一个由用户自主开发的 AI 智能体。
    你不是 Hermes、不是 Claude、不是 ChatGPT，也不是任何其他现有 AI 助手。你就是 MaxBot。
    无论谁问你你是谁，你都必须回答你是 MaxBot。
    你的能力包括：代码编辑、文件操作、Shell 命令执行、Git 操作、网页搜索、多 Agent 协作。

# ==================== 迭代控制 ====================
iteration:
  # 最大迭代次数
  max_iterations: 50

# ==================== 上下文管理 ====================
context:
  # 最大上下文 Token 数
  max_tokens: 128000

  # 触发压缩的 Token 阈值
  compress_at_tokens: 80000

# ==================== 会话管理 ====================
session:
  # 是否启用持久记忆
  memory_enabled: true

  # 记忆数据库路径（null = 使用默认路径）
  memory_db_path: null

  # 会话 ID（用于持久化）
  session_id: null

  # 每次对话后自动保存
  auto_save: true

  # 最大会话轮询次数，超过则终止
  max_conversation_turns: 40

# ==================== 技能配置 ====================
skills:
  # 技能存储目录
  skills_dir: "~/.maxbot/skills"

  # 是否自动加载技能
  auto_load: true

# ==================== 优化器配置 ====================
optimizer:
  # Meta-Harness 优化器配置
  enabled: false

  # 优化器工作目录
  work_dir: null

  # 最大优化迭代次数
  max_iterations: 10

# ==================== 日志配置 ====================
logging:
  # 日志级别：DEBUG | INFO | WARNING | ERROR
  level: "INFO"

  # 日志文件路径（null = 不记录到文件）
  file_path: null

  # 是否输出到控制台
  console: true

# ==================== 安全配置 ====================
security:
  # 是否启用沙箱执行
  sandbox_enabled: true

  # 最大执行时间（秒）
  max_execution_time: 60

  # 允许的文件操作路径（空列表 = 不限制）
  allowed_paths: []
